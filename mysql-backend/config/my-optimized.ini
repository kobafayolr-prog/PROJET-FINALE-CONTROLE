# ============================================================
# TimeTrack BGFIBank - Configuration MySQL OPTIMISÉE
# Pour supporter 200+ utilisateurs simultanés
# ============================================================
#
# IMPORTANT: Ce fichier doit être copié dans :
# Windows: C:\ProgramData\MySQL\MySQL Server 8.0\my.ini
# Linux:   /etc/mysql/my.cnf
#
# Après modification, redémarrer MySQL :
# Windows: net stop MySQL80 && net start MySQL80
# Linux:   sudo systemctl restart mysql
# ============================================================

[mysqld]

# ============================================================
# CONNEXIONS - Augmenter pour 200+ utilisateurs
# ============================================================
max_connections = 500
max_user_connections = 480

# Connection timeout
wait_timeout = 600
interactive_timeout = 600

# ============================================================
# PERFORMANCE - Buffer Pool (RAM)
# ============================================================
# IMPORTANT: Adapter selon la RAM du serveur
# Règle: 50-70% de la RAM totale
#
# Serveur 4 GB RAM  → innodb_buffer_pool_size = 2G
# Serveur 8 GB RAM  → innodb_buffer_pool_size = 4G
# Serveur 16 GB RAM → innodb_buffer_pool_size = 8G
# Serveur 32 GB RAM → innodb_buffer_pool_size = 16G

innodb_buffer_pool_size = 4G
innodb_buffer_pool_instances = 4

# ============================================================
# LOGS - Performance & Debugging
# ============================================================
# Log des requêtes lentes (> 2 secondes)
slow_query_log = 1
slow_query_log_file = "slow-queries.log"
long_query_time = 2

# Log général (désactiver en production pour performance)
# general_log = 0

# ============================================================
# CACHE - Améliore les requêtes répétées
# ============================================================
# Thread cache
thread_cache_size = 100

# Query cache (désactivé par défaut en MySQL 8.0)
# Utiliser Redis à la place pour meilleur cache

# ============================================================
# INNODB - Moteur de base de données
# ============================================================
innodb_log_file_size = 256M
innodb_flush_log_at_trx_commit = 2
innodb_flush_method = O_DIRECT

# Optimisation des écritures
innodb_write_io_threads = 8
innodb_read_io_threads = 8

# ============================================================
# TABLES & INDEX
# ============================================================
table_open_cache = 4000
table_definition_cache = 2000

# Taille max des paquets (pour gros INSERT)
max_allowed_packet = 64M

# ============================================================
# BINLOG - Réplication (optionnel)
# ============================================================
# Désactiver si pas de réplication
# binlog_expire_logs_seconds = 604800  # 7 jours

# ============================================================
# SÉCURITÉ
# ============================================================
# Désactiver DNS lookup (améliore performance)
skip_name_resolve = 1

# ============================================================
# MONITORING
# ============================================================
performance_schema = ON

[client]
default-character-set = utf8mb4

[mysql]
default-character-set = utf8mb4
