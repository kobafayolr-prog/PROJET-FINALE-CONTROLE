# ============================================================
# TimeTrack BGFIBank - Configuration Nginx Production
# Reverse Proxy HTTPS avec HSTS et sécurité bancaire
# ============================================================

# Redirection HTTP → HTTPS (force SSL)
server {
    listen 80;
    listen [::]:80;
    server_name timetrack.bgfibank.com;  # Remplacer par votre domaine
    
    # Redirection permanente vers HTTPS
    return 301 https://$server_name$request_uri;
}

# Configuration HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name timetrack.bgfibank.com;  # Remplacer par votre domaine

    # ============================================
    # CERTIFICATS SSL/TLS
    # ============================================
    # Obtenir avec Let's Encrypt: certbot certonly --nginx -d timetrack.bgfibank.com
    ssl_certificate     /etc/letsencrypt/live/timetrack.bgfibank.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timetrack.bgfibank.com/privkey.pem;
    
    # Protocoles TLS modernes uniquement (PCI-DSS compliant)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;  # Générer avec: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048

    # ============================================
    # EN-TÊTES DE SÉCURITÉ (HSTS + CSP)
    # ============================================
    # HSTS (HTTP Strict Transport Security) - Force HTTPS pour 2 ans
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # CSP (délégué au backend Express, mais peut être renforcé ici)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net;" always;
    
    # Protection contre clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # Protection XSS
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer strict
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # REVERSE PROXY VERS NODE.JS
    # ============================================
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Timeouts (ajustés pour dashboards lents)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }

    # ============================================
    # FICHIERS STATIQUES (optionnel - peut rester sur Node.js)
    # ============================================
    # location /static/ {
    #     alias /home/user/webapp/mysql-backend/public/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ============================================
    # LOGS
    # ============================================
    access_log /var/log/nginx/timetrack-access.log;
    error_log  /var/log/nginx/timetrack-error.log warn;
    
    # Limite taille upload (fichiers CSV export)
    client_max_body_size 10M;
}
